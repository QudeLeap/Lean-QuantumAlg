name = "QuantumAlg"
defaultTargets = ["QuantumAlg"]
lintDriver = "batteries/runLinter"

[leanOptions]
pp.unicode.fun = true
autoImplicit = false
weak.linter.mathlibStandardSet = true
weak.linter.flexible = true
weak.linter.pythonStyle = false
weak.linter.checkInitImports = false
weak.linter.allScriptsDocumented = false
weak.linter.unicodeLinter = false

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.31.0"

[[require]]
name = "cslib"
git = "https://github.com/leanprover/cslib.git"
rev = "v4.31.0"

[[lean_lib]]
name = "QuantumAlg"
