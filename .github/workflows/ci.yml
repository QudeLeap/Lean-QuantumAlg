name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Mathlib cache and build
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build: true
